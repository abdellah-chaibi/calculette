<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="calcul.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div id="parent">

        <button id="smb">mode somber</button>
        <div id="btn">
            <input type="text" id="scrn" placeholder="0">
            <button value="C" id="btnC"><i class="fa-solid fa-calculator"></i></button>
            <button value="--" id="btnflech"><i class="fa-solid fa-delete-left"></i></button>
            <button value="%" id="btnmod">%</button>
            <button value="+" id="btnplus">+</button>
            <button value="1" id="btn1">1</button>
            <button value="2" id="btn2">2</button>
            <button value="3" id="btn2">3</button>
            <button value="-" id="btnmoin">-</button>
            <button value="4" id="btn4">4</button>
            <button value="5" id="btn5">5</button>
            <button value="6" id="btn6">6</button>
            <button value="/" id="btnsur"><i class="fa-solid fa-divide"></i></button>
            <button value="7" id="btn7">7</button>
            <button value="8" id="btn8">8</button>
            <button value="9" id="btn9">9</button>
            <button value="*" id="btnfois">*</button>
            <button value="0" id="btn9">0</button>
            <button value="." id="btnpoint">.</button>
            <button id="egala" value="=">=</button>
        </div>
        <script src="clacul.js">

        </script>

    </div>
</body>

</html>
